name: Docker Image CI

on:
  push:
    branches: [ "master" ]

permissions:
  contents: read
  packages: write

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Login to GitHub Container Registry
        run: echo "${{ secrets.GITHUB_TOKEN }}" | docker login ghcr.io -u "${{ github.actor }}" --password-stdin

      - name: Login to Docker Hub
        run: echo "${{ secrets.DOCKERHUB_TOKEN }}" | docker login -u "${{ secrets.DOCKERHUB_USERNAME }}" --password-stdin

      - name: Build Dockge base image
        run: |
          docker build . \
            --file docker/Base.Dockerfile \
            --tag cmcooper1980/dockge:base

      - name: Build Dockge healthcheck image
        run: |
          docker build . \
            --file docker/BuildHealthCheck.Dockerfile \
            --tag cmcooper1980/dockge:build-healthcheck

      - name: Build Docker image
        run: |
          docker build . \
            --file docker/Dockerfile \
            --target release \
            --tag ghcr.io/${{ github.repository_owner }}/dockge:latest \
            --tag ghcr.io/${{ github.repository_owner }}/dockge:${{ github.sha }} \
            --tag ${{ secrets.DOCKERHUB_USERNAME }}/dockge:latest \
            --tag ${{ secrets.DOCKERHUB_USERNAME }}/dockge:${{ github.sha }}

      - name: Push Docker image
        run: |
          docker push ghcr.io/${{ github.repository_owner }}/dockge:latest
          docker push ghcr.io/${{ github.repository_owner }}/dockge:${{ github.sha }}
          docker push ${{ secrets.DOCKERHUB_USERNAME }}/dockge:latest
          docker push ${{ secrets.DOCKERHUB_USERNAME }}/dockge:${{ github.sha }}

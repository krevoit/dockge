name: Docker Image CI

on:
  push:
    branches: [ "master", "dev-file" ]

permissions:
  contents: read
  packages: write

env:
  DOCKERHUB_IMAGE: krevoit/dockge

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Login to GitHub Container Registry
        run: echo "${{ secrets.GITHUB_TOKEN }}" | docker login ghcr.io -u "${{ github.actor }}" --password-stdin

      - name: Login to Docker Hub
        run: echo "${{ secrets.DOCKERHUB_TOKEN }}" | docker login -u "${{ secrets.DOCKERHUB_USERNAME }}" --password-stdin

      - name: Build Dockge base image
        run: |
          docker build . \
            --file docker/Base.Dockerfile \
            --tag cmcooper1980/dockge:base

      - name: Build Dockge healthcheck image
        run: |
          docker build . \
            --file docker/BuildHealthCheck.Dockerfile \
            --tag cmcooper1980/dockge:build-healthcheck

      - name: Build Docker image
        run: |
          docker build . \
            --file docker/Dockerfile \
            --target release \
            --tag ghcr.io/${{ github.repository_owner }}/dockge:${{ github.sha }} \
            --tag ${{ env.DOCKERHUB_IMAGE }}:${{ github.sha }}

      - name: Push SHA Docker image
        run: |
          docker push ghcr.io/${{ github.repository_owner }}/dockge:${{ github.sha }}
          docker push ${{ env.DOCKERHUB_IMAGE }}:${{ github.sha }}

      - name: Push latest tag
        if: github.ref == 'refs/heads/master'
        run: |
          docker tag ghcr.io/${{ github.repository_owner }}/dockge:${{ github.sha }} ghcr.io/${{ github.repository_owner }}/dockge:latest
          docker tag ${{ env.DOCKERHUB_IMAGE }}:${{ github.sha }} ${{ env.DOCKERHUB_IMAGE }}:latest
          docker push ghcr.io/${{ github.repository_owner }}/dockge:latest
          docker push ${{ env.DOCKERHUB_IMAGE }}:latest

      - name: Push dev-file tag
        if: github.ref == 'refs/heads/dev-file'
        run: |
          docker tag ghcr.io/${{ github.repository_owner }}/dockge:${{ github.sha }} ghcr.io/${{ github.repository_owner }}/dockge:dev-file
          docker tag ${{ env.DOCKERHUB_IMAGE }}:${{ github.sha }} ${{ env.DOCKERHUB_IMAGE }}:dev-file
          docker push ghcr.io/${{ github.repository_owner }}/dockge:dev-file
          docker push ${{ env.DOCKERHUB_IMAGE }}:dev-file
